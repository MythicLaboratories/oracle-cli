[project]
name = "kimi-code"
version = "1.25.0"
description = "Oracle CLI — AI agent for the terminal."
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["oracle-cli==1.25.0"]

[project.scripts]
oracle-code = "kimi_cli.__main__:main"

[build-system]
requires = ["uv_build>=0.8.5,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["kimi_code"]
